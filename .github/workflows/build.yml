name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-25.05
      - name: Build whiterabbit
        # Override palefox: the flake pins it to a local path
        # (/home/tom/code/palefox) for dev convenience; CI doesn't have
        # that checkout, so point it at the upstream repo instead.
        run: nix build --override-input palefox github:tompassarelli/palefox .#nixosConfigurations.whiterabbit.config.system.build.toplevel
