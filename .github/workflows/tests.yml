name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: firnos

      - name: Checkout nisp (sibling clone — firn-build expects ../nisp)
        uses: actions/checkout@v4
        with:
          repository: tompassarelli/nisp
          ref: v0.2.0
          path: nisp

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: Install Racket
        run: nix profile install nixpkgs#racket

      - name: Link nisp package
        run: |
          raco pkg install --auto --batch --link --force "$GITHUB_WORKSPACE/nisp"
          raco setup nisp

      - name: Drift check (.rkt and .nix in sync)
        # Regenerates every .nix from its sibling .rkt and fails if any
        # generated file differs from what's committed. Forces .rkt to
        # remain the source of truth.
        working-directory: firnos
        run: |
          ./scripts/firn-build
          if ! git diff --exit-code; then
            echo "::error::Generated .nix files don't match .rkt sources. Run firn-build locally and commit."
            exit 1
          fi
