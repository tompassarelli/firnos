name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: firnos

      - name: Checkout beagle (sibling clone — firn-build expects ../beagle)
        uses: actions/checkout@v4
        with:
          repository: tompassarelli/beagle
          path: beagle

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: Install Racket
        run: nix profile install nixpkgs#racket

      - name: Link beagle package
        run: |
          raco pkg install --auto --batch --link --force "$GITHUB_WORKSPACE/beagle/beagle-lib"
          raco setup beagle

      - name: Drift check (.bnix and .nix in sync)
        # Regenerates every .nix from its sibling .bnix and fails if any
        # generated file differs from what's committed. Forces .bnix to
        # remain the source of truth.
        working-directory: firnos
        env:
          BEAGLE_PATH: ${{ github.workspace }}/beagle
        run: |
          ./scripts/firn-build
          if ! git diff --exit-code; then
            echo "::error::Generated .nix files don't match .bnix sources. Run firn-build locally and commit."
            exit 1
          fi
